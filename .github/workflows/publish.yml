name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to verify from TestPyPI, for example 0.1.0"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Validate package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(python -c 'import pathlib, re, tomllib; project = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]; text = pathlib.Path("queryforge/__init__.py").read_text(encoding="utf-8"); match = re.search(r"^__version__ = \"([^\"]+)\"$", text, re.MULTILINE); assert match is not None, "queryforge.__version__ is missing"; init = match.group(1); assert project == init, f"pyproject.toml version {project} != queryforge.__version__ {init}"; print(project)')"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "${PACKAGE_VERSION}" != "${TAG_VERSION}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}" >&2
              exit 1
            fi
          fi
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "${GITHUB_ENV}"

      - name: Build
        run: python -m build

      - name: Check artifacts
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: queryforge-dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/queryforge
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: queryforge-dist
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  verify-testpypi:
    name: Verify TestPyPI install
    runs-on: ubuntu-latest
    needs: publish-testpypi
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve package version
        shell: bash
        run: |
          PACKAGE_VERSION="${{ inputs.version }}"
          if [[ -z "${PACKAGE_VERSION}" ]]; then
            PACKAGE_VERSION="$(python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"
          fi
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "${GITHUB_ENV}"

      - name: Wait for TestPyPI propagation
        run: sleep 30

      - name: Install from TestPyPI
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "queryforge==${PACKAGE_VERSION}"
          python -c "import queryforge; print(queryforge.__version__)"

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/queryforge
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: queryforge-dist
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
